<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Pengeluaran</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>LuRRa</h2>
    <a href="index.html">Dashboard</a>
    <a href="penjualan.html">Input Penjualan</a>
    <a href="pengeluaran.html" class="active">Input Pengeluaran</a>
    <a href="laporan.html">Laporan</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <h1>Input Data Pengeluaran</h1>

    <div class="form-card">
      <form id="formPengeluaran" autocomplete="off">

        <div class="form-group">
          <label for="tanggal">Tanggal</label>
          <input type="date" id="tanggal" required>
        </div>

        <div class="form-group">
          <label for="keterangan">Keterangan</label>
          <input type="text" id="keterangan" 
                 placeholder="Contoh: Beli Bahan / Ongkir / Sewa" required>
        </div>

        <div class="form-group">
          <label for="harga">Harga</label>
          <input type="number" id="harga" 
                 placeholder="Contoh: 50000" min="0" required>
        </div>

        <div class="form-group">
          <label for="jumlah">Jumlah</label>
          <input type="number" id="jumlah" 
                 placeholder="Contoh: 1" min="1" required>
        </div>

        <button type="submit">
          Simpan Pengeluaran
        </button>

      </form>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
